<!DOCTYPE html>
<html><head><meta charset="utf-8"/><title>AMAdocs</title>
<style>
  html,body{height:100%;margin:0}
  body{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f6f7fb;color:#1f2430}
  .mark{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,#6366f1,#22d3ee);
    display:grid;place-items:center;color:#fff;font-weight:800;font-size:30px;box-shadow:0 8px 24px rgba(80,70,229,.25)}
  h1{margin:6px 0 0;font-size:24px;letter-spacing:-.4px}h1 span{color:#4f46e5}
  p{margin:0;color:#6b7280;font-size:14px}
  .bar{width:200px;height:5px;border-radius:9px;background:#e6e8ef;overflow:hidden;margin-top:4px}
  .bar i{display:block;width:40%;height:100%;background:#4f46e5;border-radius:9px;animation:slide 1.1s infinite ease-in-out}
  @keyframes slide{0%{margin-left:-40%}100%{margin-left:100%}}
</style></head>
<body>
  <div class="mark">A</div>
  <h1>AMA<span>docs</span></h1>
  <p>Starting your private document assistant…</p>
  <div class="bar"><i></i></div>
</body></html>
